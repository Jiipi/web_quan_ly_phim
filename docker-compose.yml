services:
  postgres:
    image: postgres:16-alpine
    container_name: phimflow_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminpassword123
      POSTGRES_DB: phimflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phimflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: phimflow_web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:adminpassword123@postgres:5432/phimflow_db?schema=public"
      # Secret DEV-ONLY (đã sinh ngẫu nhiên). Production PHẢI override qua biến môi trường thật.
      AUTH_SECRET: "${AUTH_SECRET:-nVFFd53FUI2amM0kLSVVC9qBy6IIGvE0yC09thQeHSQ=}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      AUTH_TRUST_HOST: "true"
      NODE_ENV: "development"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
